<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Eid Salami Quiz with Ador</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Inter,system-ui;
background:radial-gradient(circle at top,#1a1a40,#07071a);
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:95%;
max-width:700px;
background:rgba(255,255,255,0.06);
backdrop-filter:blur(20px);
padding:30px;
border-radius:20px;
box-shadow:0 20px 60px rgba(0,0,0,0.6);
}

h1{
text-align:center;
font-size:36px;
background:linear-gradient(90deg,#7afcff,#feff9c,#ff65a3,#7afcff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.progress{
height:10px;
background:#333;
border-radius:10px;
overflow:hidden;
margin:20px 0;
}

.progress-bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#6a11cb,#2575fc);
}

.question{
font-size:22px;
margin-bottom:20px;
}

.option{
display:block;
margin:10px 0;
padding:12px;
background:rgba(255,255,255,0.08);
border-radius:10px;
cursor:pointer;
transition:0.2s;
}

.option:hover{
background:rgba(255,255,255,0.18);
}

button{
margin-top:20px;
padding:10px 25px;
font-size:18px;
border:none;
border-radius:10px;
background:#2575fc;
color:white;
cursor:pointer;
}

input{
padding:10px;
font-size:16px;
border-radius:8px;
border:none;
width:100%;
}

.result{
text-align:center;
font-size:26px;
}

</style>
</head>

<body>

<div class="container">

<h1>🌙 Eid Salami Quiz with Ador</h1>

<div class="progress">
<div class="progress-bar" id="bar"></div>
</div>

<div id="quiz"></div>

</div>

<script>

let current=0;
let score=0;

const questions=[

{q:"What is my full name?",options:["Adnan Hassan","Ador Hassan","Adnan Hassan Ador","Adnan Rahman"],answer:0},

{q:"What is my favorite color?",options:["Black","Blue","Red","Green"],answer:0},

{q:"What is my favorite food?",options:["Chicken Biryani","tehari","Chap Polao","Kacchi"],answer:1},

{q:"My age?",options:["20","21","22","23"],answer:3},

{q:"My birth date?",options:["12","21","18","25"],answer:1},

{q:"My birth month?",options:["January","February","November","December"],answer:2},

{q:"My birth year?",options:["2000","2001","2002","2003"],answer:2},

{q:"What am I studying?",options:["CSE","EEE","BBA","Law"],answer:0},

{q:"Name one of my close friends",type:"text"},

{q:"Which sport I love most?",options:["Football","Cricket","Badminton","Basketball"],answer:1},

{q:"My Instagram username?",options:["adnan_hassan","adnan_58","with_adnan58","ador58"],answer:2},

{q:"My height?",options:["5'9","5'10","5'11","6'0"],answer:2},

{q:"My dream profession?",options:["Doctor","Software Engineer","Designer","Pilot"],answer:1},

{q:"What drink do I like the most?",options:["Coffee","Tea","Juice","Soft Drinks"],answer:3},

{q:"My university major?",options:["Computer Science","Business","Math","Physics"],answer:0},

{q:"Which city I love the most?",options:["Dhaka","Chittagong","Sylhet","Rajshahi"],answer:0},

{q:"What kind of music do I enjoy?",options:["Pop","Hip hop","Romantic","Band"],answer:3},

{q:"My favorite season?",options:["Summer","Rainy","Winter","Autumn"],answer:2},

{q:"What is my favorite dessert?",options:["Ice cream","Chocolate","Cake","Faluda"],answer:2},

{q:"Which animal do I like most?",options:["Panda","Dog","Bird","Cat"],answer:3},

];

function loadQuestion(){

let q=questions[current];

document.getElementById("bar").style.width=((current)/questions.length*100)+"%";

let html="<div class='question'>"+(current+1)+". "+q.q+"</div>";

if(q.type==="text"){

html+=`<input id="textAns" placeholder="Type answer here">
<button onclick="checkText()">Submit</button>`;

}else{

q.options.forEach((opt,i)=>{

html+=`<div class="option" onclick="check(${i})">${opt}</div>`;

});

}

document.getElementById("quiz").innerHTML=html;

}

function check(i){

if(i===questions[current].answer) score++;

next();

}

function checkText(){

let val=document.getElementById("textAns").value.toLowerCase();

if(val==="aziz"||val==="rabbi"||val==="tumbu") score++;

next();

}

function next(){

current++;

if(current<questions.length){

loadQuestion();

}else{

showResult();

}

}

function showResult(){

let eidi=score*10;

document.getElementById("quiz").innerHTML=`

<div class="result">

🎉 Quiz Completed! 🎉

<br><br>

Correct Answers: <b>${score} / 20</b>

<br><br>

💰 Your Eidi: <b>${eidi} BDT</b>

<br><br>

Eid Mubarak!  
— Ador ❤️

</div>

`;

document.getElementById("bar").style.width="100%";

}

loadQuestion();

</script>

</body>
</html>
