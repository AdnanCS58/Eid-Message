<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Eid Experience</title>

<style>

body{
margin:0;
height:100vh;
font-family:Inter,system-ui;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:radial-gradient(circle at 20% 20%,#1a1a40,#07071a 60%);
color:white;
}

/* particles */

.particle{
position:absolute;
width:4px;
height:4px;
border-radius:50%;
background:rgba(255,255,255,0.6);
animation:float 10s linear infinite;
}

@keyframes float{
from{transform:translateY(100vh)}
to{transform:translateY(-10vh)}
}

/* moon */

.moon{
position:absolute;
top:80px;
right:120px;
width:140px;
height:140px;
border-radius:50%;
background:radial-gradient(circle,#ffffff,#d4d4ff);
box-shadow:0 0 60px rgba(255,255,255,0.6);
}

.moon:after{
content:"";
position:absolute;
left:35px;
top:0;
width:140px;
height:140px;
background:#07071a;
border-radius:50%;
}

/* card */

.card{
background:rgba(255,255,255,0.06);
backdrop-filter:blur(30px);
padding:60px;
border-radius:24px;
width:620px;
text-align:center;
border:1px solid rgba(255,255,255,0.1);
box-shadow:0 20px 80px rgba(0,0,0,0.6);
}

/* title */

h1{
font-size:78px;

background:linear-gradient(90deg,#7afcff,#feff9c,#ff65a3,#7afcff);
background-size:400%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

animation:gradientMove 6s infinite linear;
}

@keyframes gradientMove{
0%{background-position:0%}
100%{background-position:400%}
}

p{
font-size:26px;
}

/* task buttons */

.task{
display:block;
margin:10px auto;
padding:12px 20px;
font-size:22px;
border-radius:20px;
border:none;
cursor:pointer;
background:linear-gradient(135deg,#6a11cb,#2575fc);
color:white;
transition:0.3s;
}

.task:hover{
transform:scale(1.05);
}

/* code input */

#codeBox{
margin-top:20px;
display:none;
}

input{
padding:10px;
font-size:20px;
border-radius:10px;
border:none;
}

.unlockBtn{
padding:10px 20px;
font-size:20px;
margin-left:10px;
border:none;
border-radius:10px;
background:#00c853;
color:white;
cursor:pointer;
}

/* final message */

#msg{
margin-top:30px;
font-size:30px;
opacity:0;
transition:1s;
}

</style>
</head>

<body>

<div class="moon"></div>

<div class="card">

<h1>Eid Mubarak</h1>

<p>Choose a task to unlock your Eidi</p>

<button class="task" onclick="chooseTask('Dance for 10 seconds')">💃 Dance for 10 seconds</button>
<button class="task" onclick="chooseTask('Sing an Eid song')">🎤 Sing an Eid song</button>
<button class="task" onclick="chooseTask('Say 3 compliments to Ador')">😄 Say 3 compliments to Ador</button>
<button class="task" onclick="chooseTask('Feed Ador something sweet')">🍬 Feed Ador something sweet</button>
<button class="task" onclick="chooseTask('Tell a funny joke')">😂 Tell a funny joke</button>
<button class="task" onclick="chooseTask('Give a high five')">✋ Give a high five</button>

<div id="selectedTask"></div>

<div id="codeBox">

<p>Task completed? Enter the secret code</p>

<input id="codeInput" placeholder="Enter code">

<button class="unlockBtn" onclick="checkCode()">Unlock</button>

</div>

<div id="msg">

✨ Eidi Unlocked ✨

<br><br>

May your Eid be filled with joy, blessings, and endless happiness.

<br><br>

— Ador ❤️

</div>

</div>

<script>

/* floating particles */

for(let i=0;i<80;i++){

let p=document.createElement("div");
p.className="particle";

p.style.left=Math.random()*100+"vw";
p.style.animationDuration=(Math.random()*8+6)+"s";

document.body.appendChild(p);

}

function chooseTask(task){

document.getElementById("selectedTask").innerHTML=
"<p>Task Selected: <b>"+task+"</b></p>";

document.getElementById("codeBox").style.display="block";

}

/* secret code */

const secretCode="EIDI2026";

function checkCode(){

let entered=document.getElementById("codeInput").value;

if(entered===secretCode){

document.getElementById("msg").style.opacity="1";

}else{

alert("Wrong code 😅");

}

}

</script>

</body>
</html>
