<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Eid Surprise</title>

<style>

body{
margin:0;
height:100vh;
font-family:'Segoe UI',sans-serif;
color:white;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364,#1a2a6c);
}

/* STARFIELD */

.star{
position:absolute;
width:3px;
height:3px;
background:white;
border-radius:50%;
animation:twinkle 3s infinite alternate;
}

@keyframes twinkle{
from{opacity:0.2}
to{opacity:1}
}

/* MOON */

.moon{
position:absolute;
top:70px;
right:100px;
width:140px;
height:140px;
border-radius:50%;
background:radial-gradient(circle,#fff,#ddd,#aaa);
box-shadow:0 0 60px white;
}

/* CARD */

.card{
background:rgba(255,255,255,0.12);
backdrop-filter:blur(25px);
padding:60px;
border-radius:25px;
box-shadow:0 0 60px rgba(255,255,255,0.4);
text-align:center;
z-index:10;
max-width:500px;
}

/* BIG COLORFUL TITLE */

h1{
font-size:56px;
margin-bottom:15px;
background:linear-gradient(45deg,#ffdd00,#ff7e5f,#ff4e50,#f9d423);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{filter:drop-shadow(0 0 5px gold)}
to{filter:drop-shadow(0 0 20px orange)}
}

/* MESSAGE TEXT */

p{
font-size:22px;
opacity:0.95;
}

/* BUTTON */

button{
margin-top:30px;
padding:16px 40px;
border:none;
border-radius:40px;
background:linear-gradient(45deg,#ff512f,#f09819);
font-size:20px;
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

/* HIDDEN MESSAGE */

#message{
margin-top:25px;
font-size:24px;
opacity:0;
transition:1s;
line-height:1.6;
}

/* CONFETTI */

.confetti{
position:absolute;
width:10px;
height:10px;
animation:fall 4s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-100px)}
100%{transform:translateY(110vh)}
}

/* MONEY */

.money{
position:absolute;
font-size:28px;
animation:moneyFall 5s linear infinite;
}

@keyframes moneyFall{
0%{transform:translateY(-100px)}
100%{transform:translateY(110vh)}
}

/* FIREWORK */

.firework{
position:absolute;
width:8px;
height:8px;
border-radius:50%;
animation:explode 1s ease-out forwards;
}

@keyframes explode{
0%{transform:scale(1)}
100%{transform:scale(10); opacity:0}
}

</style>
</head>

<body>

<div class="moon"></div>

<div class="card">

<h1>🌙 Eid Mubarak</h1>

<p>
May your Eid shine with joy, love, and beautiful moments.
</p>

<button onclick="unlock()">✨ Unlock Your Eidi</button>

<div id="message">

🎉 Surprise! Your Eidi is waiting inside the envelope 💰  

<br><br>

Wishing you happiness, laughter, and endless blessings.

<br><br>

❤️ From <b>Ador</b>

</div>

</div>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_8c1b4fdcd0.mp3">
</audio>

<script>

/* STARS */

for(let i=0;i<150;i++){

let star=document.createElement("div");
star.className="star";

star.style.left=Math.random()*100+"vw";
star.style.top=Math.random()*100+"vh";
star.style.animationDuration=(Math.random()*3+2)+"s";

document.body.appendChild(star);

}

/* UNLOCK */

function unlock(){

document.getElementById("message").style.opacity="1";
document.getElementById("music").play();

confetti();
money();
fireworks();

}

/* CONFETTI */

function confetti(){

for(let i=0;i<80;i++){

let c=document.createElement("div");
c.className="confetti";

c.style.left=Math.random()*100+"vw";
c.style.background=`hsl(${Math.random()*360},100%,50%)`;

document.body.appendChild(c);

}

}

/* MONEY RAIN */

function money(){

for(let i=0;i<30;i++){

let m=document.createElement("div");
m.className="money";
m.innerHTML="💸";

m.style.left=Math.random()*100+"vw";

document.body.appendChild(m);

}

}

/* FIREWORKS */

function fireworks(){

for(let i=0;i<15;i++){

let f=document.createElement("div");
f.className="firework";

f.style.left=Math.random()*100+"vw";
f.style.top=Math.random()*50+"vh";
f.style.background=`hsl(${Math.random()*360},100%,60%)`;

document.body.appendChild(f);

}

}

</script>

</body>
</html>
