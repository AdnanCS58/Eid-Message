<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Eid Experience</title>

<style>

body{
margin:0;
height:100vh;
font-family:Inter,system-ui;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:radial-gradient(circle at 20% 20%,#1a1a40,#07071a 60%);
color:white;
}

/* Floating particles */

.particle{
position:absolute;
width:4px;
height:4px;
border-radius:50%;
background:rgba(255,255,255,0.6);
animation:float 10s linear infinite;
}

@keyframes float{
from{transform:translateY(100vh)}
to{transform:translateY(-10vh)}
}

/* Crescent moon */

.moon{
position:absolute;
top:80px;
right:120px;
width:140px;
height:140px;
border-radius:50%;
background:radial-gradient(circle,#ffffff,#d4d4ff);
box-shadow:0 0 60px rgba(255,255,255,0.6);
}

.moon:after{
content:"";
position:absolute;
left:35px;
top:0;
width:140px;
height:140px;
background:#07071a;
border-radius:50%;
}

/* Glass card */

.card{
position:relative;
background:rgba(255,255,255,0.06);
backdrop-filter:blur(30px);
padding:60px;
border-radius:24px;
width:420px;
text-align:center;
border:1px solid rgba(255,255,255,0.1);
box-shadow:0 20px 80px rgba(0,0,0,0.6);
}

/* Aurora gradient text */

h1{
font-size:58px;
margin:0 0 20px 0;

background:linear-gradient(90deg,#7afcff,#feff9c,#ff65a3,#7afcff);
background-size:300%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

animation:gradientMove 6s infinite linear;
}

@keyframes gradientMove{
0%{background-position:0%}
100%{background-position:300%}
}

p{
font-size:20px;
opacity:0.85;
}

/* Button */

button{

margin-top:30px;
padding:14px 40px;
border-radius:40px;
border:none;
font-size:18px;

background:linear-gradient(135deg,#6a11cb,#2575fc);
color:white;

cursor:pointer;
transition:0.4s;

box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

button:hover{
transform:translateY(-4px) scale(1.05);
}

/* Hidden message */

#msg{
margin-top:25px;
font-size:22px;
opacity:0;
transition:1s;
line-height:1.6;
}

/* Money */

.money{
position:absolute;
font-size:28px;
animation:money 6s linear infinite;
}

@keyframes money{
0%{transform:translateY(-100px)}
100%{transform:translateY(110vh)}
}

/* Fireworks */

.firework{
position:absolute;
width:6px;
height:6px;
border-radius:50%;
animation:explode 1s ease-out forwards;
}

@keyframes explode{
0%{transform:scale(1)}
100%{transform:scale(12); opacity:0}
}

</style>
</head>

<body>

<div class="moon"></div>

<div class="card">

<h1>Eid Mubarak</h1>

<p>
May this Eid bring peace, joy, and beautiful moments into your life.
</p>

<button onclick="unlock()">Unlock Your Eidi</button>

<div id="msg">

✨ Your Eidi has been successfully unlocked 💰  

<br><br>

Wishing you endless happiness and blessings.

<br><br>

— Ador ❤️

</div>

</div>

<script>

/* particles */

for(let i=0;i<80;i++){

let p=document.createElement("div");
p.className="particle";

p.style.left=Math.random()*100+"vw";
p.style.animationDuration=(Math.random()*8+6)+"s";

document.body.appendChild(p);

}

/* unlock animation */

function unlock(){

document.getElementById("msg").style.opacity="1";

money();
fireworks();

}

function money(){

for(let i=0;i<20;i++){

let m=document.createElement("div");
m.className="money";
m.innerHTML="💸";

m.style.left=Math.random()*100+"vw";

document.body.appendChild(m);

}

}

function fireworks(){

for(let i=0;i<10;i++){

let f=document.createElement("div");
f.className="firework";

f.style.left=Math.random()*100+"vw";
f.style.top=Math.random()*60+"vh";

f.style.background=`hsl(${Math.random()*360},100%,60%)`;

document.body.appendChild(f);

}

}

</script>

</body>
</html>
